services:
  api:
    build: .
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    deploy:
      replicas: 1  # overridden by --scale flag at runtime

  nginx:
    image: nginx:alpine
    ports:
      - "8000:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

  ui:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://nginx:8080
    command: streamlit run ui/app.py --server.address 0.0.0.0